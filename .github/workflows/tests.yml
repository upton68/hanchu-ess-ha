name: Tests

on:
  push:
  pull_request:

jobs:
  pytest:
    name: Pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install test dependencies
        # Linux runner: install the full harness (includes the HA test stack) so
        # the config-flow tests run too. See requirements-test-ha.txt for why this
        # is not used on Windows.
        run: pip install -r requirements-test-ha.txt
      - name: Run tests
        run: pytest -q
