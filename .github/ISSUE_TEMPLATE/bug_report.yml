name: Bug report
description: Report a problem with the Hanchuess integration
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in as much as you can.
        A redacted **Download diagnostics** export (integration page) is the most
        useful attachment — it strips tokens and serials automatically.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error
    validations:
      required: true
  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      placeholder: "2026.6.0"
    validations:
      required: true
  - type: input
    id: integration_version
    attributes:
      label: Integration version
      description: From HACS or custom_components/hanchuess/manifest.json
      placeholder: "1.2.6"
    validations:
      required: true
  - type: dropdown
    id: install_method
    attributes:
      label: Installation method
      options:
        - HACS
        - Manual
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: >
        Logs with the `[HANCHUESS]` prefix. Enable debug logging for
        `custom_components.hanchuess` to capture more (see CONTRIBUTING.md).
      render: shell
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Diagnostics export, screenshots, anything else.
